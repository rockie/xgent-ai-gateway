gateway:
  address: "localhost:50051"
  token: "80b00edbb310cc0926a83b8fda3967e38c1962b19d94dcd9699944403f0f24b7"
  node_id: "async-api-node"

service:
  name: "async-service"
  mode: async-api

debug:
    dump_request_body: true  
    dump_submit_response: true
    dump_poll_response: true

async_api:
  timeout_secs: 120
  submit:
    url: "https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis"
    method: "POST"
    headers:
      X-DashScope-Async: "enable" 
      Content-Type: "application/json"
      Authorization: "Bearer ${DASHSCOPE_API_KEY}"
    body: |
      {
        "model": "qwen-image-plus",
        "input": {
            "prompt": <payload.prompt>
        },
        "parameters": {
            "negative_prompt": <payload.negative_prompt>,
            "size": "2048*2048",
            "n": 1,
            "prompt_extend": true,
            "watermark": false
        }
      }
  poll:
    url: "https://dashscope.aliyuncs.com/api/v1/tasks/<submit_response.output.task_id>"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer ${DASHSCOPE_API_KEY}"
    method: "GET"
    interval_secs: 5
  completed_when:
    path: "output.task_status"
    operator: equal
    value: "SUCCEEDED"
  failed_when:
    path: "output.task_status"
    operator: equal
    value: "FAILED"

response:
  success:
    body: '{"result": "<poll_response>", "status": "ok"}'
  max_bytes: 65536
